<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短影音分析 ｜ 台中慈濟醫院</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a1a2a;
      --bg-deep: #08131f;
      --card: #0c1d2e;
      --card-2: #11293f;
      --border: rgba(255,255,255,.06);
      --border-glow: rgba(63,255,176,.25);

      --primary: #3fffb0;          /* 螢光薄荷（主） */
      --primary-soft: #7bffd0;
      --primary-glow: rgba(63,255,176,.45);

      --accent: #41e8ff;           /* 電光青 */
      --accent-2: #b18bff;         /* 紫 */
      --accent-gold: #ffd166;      /* 評分星 */

      --text: #e8f4ff;
      --text-soft: #9fb7cc;
      --text-mute: #5b7288;

      --good: #3fffb0;
      --bad: #ff6b6b;
      --yt: #ff4444;
      --fb: #1877f2;

      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
      --shadow-glow: 0 0 0 1px rgba(63,255,176,.12), 0 8px 24px rgba(0,0,0,.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    .topbar {
      background: linear-gradient(135deg, var(--bg-deep) 0%, #0c1d2e 50%, #11293f 100%);
      color: var(--text);
      padding: 20px 28px;
      border-bottom: 1px solid var(--border-glow);
      box-shadow: 0 0 40px rgba(63,255,176,.06), var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .topbar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary) 30%, var(--accent) 70%, transparent);
      opacity: .6;
    }
    .topbar h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px var(--primary-glow);
    }
    .topbar .subtitle {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 28px 60px;
    }

    /* ── 概覽統計 ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--text-soft);
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 1.55rem;
      font-weight: 700;
      margin-top: 4px;
      color: var(--primary);
      text-shadow: 0 0 14px var(--primary-glow);
    }
    .stat-sub {
      font-size: 0.72rem;
      color: var(--text-soft);
      margin-top: 2px;
    }

    /* ── 工具列 ── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .toolbar select, .toolbar input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
    }
    .toolbar input { min-width: 220px; }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--primary);
      color: var(--bg-deep);
      font-weight: 700;
      box-shadow: 0 0 18px var(--primary-glow), 0 0 0 1px rgba(63,255,176,.4);
    }
    .btn-primary:hover {
      background: var(--primary-soft);
      box-shadow: 0 0 24px rgba(63,255,176,.6), 0 0 0 1px rgba(63,255,176,.6);
    }
    .btn-ghost {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      border-color: var(--border-glow);
      color: var(--primary);
    }
    .btn-danger {
      background: transparent;
      color: var(--bad);
      border: 1px solid rgba(255,107,107,.35);
    }
    .btn-danger:hover {
      background: rgba(255,107,107,.1);
    }
    .btn-spacer { flex: 1; }

    /* ── 影片卡片 ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow .15s, border-color .15s, transform .15s;
      cursor: pointer;
    }
    .card:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }
    .card-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--text-soft);
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.72rem;
      color: white;
    }
    .platform-badge.youtube { background: var(--yt); }
    .platform-badge.facebook { background: var(--fb); }

    .card-body {
      padding: 12px 16px;
    }
    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .metric {
      text-align: center;
    }
    .metric-label {
      font-size: 0.68rem;
      color: var(--text-soft);
      letter-spacing: 0.03em;
    }
    .metric-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-perf {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }
    .perf-item {
      flex: 1;
      text-align: center;
    }
    .perf-label {
      font-size: 0.68rem;
      color: var(--text-soft);
    }
    .perf-value {
      font-size: 0.92rem;
      font-weight: 700;
    }
    .perf-value.good { color: var(--good); }
    .perf-value.bad { color: var(--bad); }

    .card-rating {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--accent-gold);
      letter-spacing: 0.1em;
    }

    /* ── 空狀態 ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    /* ── Modal ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 18, .75);
      backdrop-filter: blur(4px);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-bg.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border-glow);
      border-radius: 12px;
      width: 100%;
      max-width: 720px;
      margin-top: 30px;
      box-shadow: 0 0 0 1px rgba(63,255,176,.06), 0 30px 80px rgba(0,0,0,.6);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 {
      font-size: 1.1rem;
      color: var(--primary);
      text-shadow: 0 0 12px var(--primary-glow);
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-soft);
    }
    .modal-close:hover { color: var(--primary); }
    .modal-body {
      padding: 18px 22px;
    }
    .modal-foot {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      background: var(--bg-deep);
      border-radius: 0 0 12px 12px;
    }

    .form-section {
      margin-bottom: 20px;
    }
    .form-section h3 {
      font-size: 0.85rem;
      color: var(--primary);
      letter-spacing: 0.05em;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-glow);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-grid.full { grid-template-columns: 1fr; }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg-deep);
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(63,255,176,.12);
    }
    .field textarea {
      min-height: 70px;
      resize: vertical;
    }
    .rating-stars {
      display: flex;
      gap: 4px;
    }
    .star {
      font-size: 1.6rem;
      color: var(--text-mute);
      cursor: pointer;
      user-select: none;
      transition: color .1s, text-shadow .1s;
    }
    .star.active {
      color: var(--accent-gold);
      text-shadow: 0 0 12px rgba(255,209,102,.45);
    }

    /* ── 詳細 view ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }
    .detail-block {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .detail-label {
      font-size: 0.72rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 0.9rem;
      font-weight: 500;
    }
    .review-block {
      margin-bottom: 14px;
    }
    .review-block h4 {
      font-size: 0.85rem;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .review-block p {
      font-size: 0.88rem;
      white-space: pre-wrap;
      color: var(--text);
      background: var(--bg-deep);
      padding: 10px 12px;
      border-radius: 6px;
      border-left: 3px solid var(--primary);
    }

    @media print {
      :root { --bg: #fff; --card: #fff; --text: #111; --text-soft: #555; --border: #ccc; }
      body { background: #fff !important; color: #111 !important; }
      .topbar, .toolbar, .btn { display: none !important; }
      .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc !important; background: #fff !important; }
      .stat, .stat-value { background: #fff !important; color: #111 !important; text-shadow: none !important; }
      .metric-value, .perf-value, .card-title { color: #111 !important; }
      .card-rating { color: #b58900 !important; }
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .toolbar input { min-width: 0; flex: 1; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📹 短影音分析</h1>
    <div class="subtitle">台中慈濟醫院公傳室 ｜ 外包短影音成效追蹤</div>
  </div>

  <div class="container">
    <!-- 概覽 -->
    <div class="summary" id="summary"></div>

    <!-- 工具列 -->
    <div class="toolbar">
      <select id="filter-platform">
        <option value="">所有平台</option>
        <option value="youtube">YouTube</option>
        <option value="facebook">Facebook</option>
      </select>
      <select id="sort-by">
        <option value="engagement">按互動率排序</option>
        <option value="views">按觀看數排序</option>
        <option value="date">按發布日期排序</option>
        <option value="rating">按評分排序</option>
      </select>
      <input type="text" id="search" placeholder="搜尋標題、廠商、主題…">
      <div class="btn-spacer"></div>
      <button class="btn btn-ghost" id="btn-export">匯出 CSV</button>
      <button class="btn btn-ghost" id="btn-print">列印報表</button>
      <button class="btn btn-primary" id="btn-add">＋ 新增影片</button>
    </div>

    <!-- 影片清單 -->
    <div class="video-grid" id="video-grid"></div>
    <div class="empty" id="empty-state" style="display:none;">
      <div class="empty-icon">🎬</div>
      <div>還沒有任何影片紀錄</div>
      <div style="font-size:0.85rem; margin-top:6px;">點右上角「＋ 新增影片」開始</div>
    </div>
  </div>

  <!-- ─────── Modal: 新增 / 編輯 ─────── -->
  <div class="modal-bg" id="modal-edit">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modal-title">新增影片</h2>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <form id="form-video">
          <div class="form-section">
            <h3>基本資訊</h3>
            <div class="form-grid full">
              <div class="field">
                <label>影片標題 *</label>
                <input type="text" name="title" required placeholder="例：護師節溫馨小故事 EP3">
              </div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label>平台 *</label>
                <select name="platform" required>
                  <option value="youtube">YouTube</option>
                  <option value="facebook">Facebook</option>
                </select>
              </div>
              <div class="field">
                <label>發布日期 *</label>
                <input type="date" name="publishedAt" required>
              </div>
            </div>
            <div class="form-grid full">
              <div class="field">
                <label>影片連結</label>
                <input type="url" name="url" placeholder="https://...">
              </div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label>外包廠商</label>
                <input type="text" name="vendor" placeholder="例：○○影像工作室">
              </div>
              <div class="field">
                <label>主題</label>
                <select name="topic">
                  <option value="衛教">衛教</option>
                  <option value="病例">病例</option>
                  <option value="活動">活動</option>
                  <option value="形象">形象</option>
                  <option value="其他">其他</option>
                </select>
              </div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label>製作預算（NT$）</label>
                <input type="number" name="budget" min="0" step="1" placeholder="0">
              </div>
              <div class="field">
                <label>整體評分</label>
                <div class="rating-stars" id="rating-stars">
                  <span class="star" data-v="1">★</span>
                  <span class="star" data-v="2">★</span>
                  <span class="star" data-v="3">★</span>
                  <span class="star" data-v="4">★</span>
                  <span class="star" data-v="5">★</span>
                </div>
                <input type="hidden" name="rating" value="0">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>成效數據（暫時手動填寫，Phase 2 將自動抓取）</h3>
            <div class="form-grid">
              <div class="field">
                <label>觀看數</label>
                <input type="number" name="views" min="0" placeholder="0">
              </div>
              <div class="field">
                <label>讚 / 喜歡</label>
                <input type="number" name="likes" min="0" placeholder="0">
              </div>
              <div class="field">
                <label>留言數</label>
                <input type="number" name="comments" min="0" placeholder="0">
              </div>
              <div class="field">
                <label>分享數</label>
                <input type="number" name="shares" min="0" placeholder="0">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>檢討卡</h3>
            <div class="form-grid full">
              <div class="field">
                <label>👍 做得好的地方</label>
                <textarea name="strengths" placeholder="例：開場 3 秒鉤子強烈、字幕節奏剛好…"></textarea>
              </div>
              <div class="field">
                <label>🔧 可以改進的地方</label>
                <textarea name="improvements" placeholder="例：醫師受訪講太快、片尾 CTA 不明確…"></textarea>
              </div>
              <div class="field">
                <label>📋 給長官的建議</label>
                <textarea name="recommendations" placeholder="例：下一支建議改用病人視角；廠商 A 在病例題材表現較佳…"></textarea>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-foot">
        <button class="btn btn-danger" id="btn-delete" style="display:none;">刪除</button>
        <div class="btn-spacer"></div>
        <button class="btn btn-ghost" data-close>取消</button>
        <button class="btn btn-primary" id="btn-save">儲存</button>
      </div>
    </div>
  </div>

  <!-- ─────── Modal: 詳細檢視 ─────── -->
  <div class="modal-bg" id="modal-view">
    <div class="modal">
      <div class="modal-head">
        <h2 id="view-title">影片詳細</h2>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body" id="view-body"></div>
      <div class="modal-foot">
        <div class="btn-spacer"></div>
        <button class="btn btn-ghost" data-close>關閉</button>
        <button class="btn btn-primary" id="btn-edit-from-view">編輯</button>
      </div>
    </div>
  </div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
// STORAGE_LAYER  ←  Phase 1b 切換 Firestore 時，整段換掉就好
// ════════════════════════════════════════════════════════════════
// localStorage 在某些環境被禁用（如 data: URL、隱私模式）會丟例外，
// 這裡偵測一次，若不可用就 fallback 成記憶體儲存並顯示警告。
const localStorageAvailable = (() => {
  try {
    const k = '__svr_test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch { return false; }
})();

let memoryStore = null;  // 只有 fallback 時才用

const Storage = {
  KEY: 'short-video-review.videos',

  load() {
    if (!localStorageAvailable) return memoryStore ?? [];
    try {
      const raw = localStorage.getItem(this.KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  },

  saveAll(videos) {
    if (!localStorageAvailable) { memoryStore = videos; return; }
    localStorage.setItem(this.KEY, JSON.stringify(videos));
  },

  upsert(video) {
    const all = this.load();
    const now = new Date().toISOString();
    if (video.id) {
      const i = all.findIndex(v => v.id === video.id);
      if (i >= 0) {
        all[i] = { ...all[i], ...video, updatedAt: now };
      }
    } else {
      video.id = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      video.createdAt = now;
      video.updatedAt = now;
      all.push(video);
    }
    this.saveAll(all);
    return video.id;
  },

  remove(id) {
    this.saveAll(this.load().filter(v => v.id !== id));
  },
};

function showStorageWarning() {
  if (localStorageAvailable) return;
  const bar = document.createElement('div');
  bar.style.cssText = 'background:#ff6b6b;color:#fff;padding:8px 16px;text-align:center;font-size:0.85rem;';
  bar.textContent = '⚠ 此環境無法使用 localStorage（可能是預覽模式或 data: URL），目前資料只存在記憶體，重整會消失。部署到 GitHub Pages 後即可正常儲存。';
  document.body.insertBefore(bar, document.body.firstChild);
}

// ════════════════════════════════════════════════════════════════
// API_FETCH_HOOK  ←  Phase 2 接 YouTube Data API 時把 null 換成真的呼叫
// ════════════════════════════════════════════════════════════════
async function fetchVideoMetricsFromAPI(/* video */) {
  // TODO Phase 2: YouTube Data API v3
  //   const id = parseYouTubeId(video.url);
  //   const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${id}&key=${API_KEY}`);
  //   ...
  // TODO Phase 4: Facebook Graph API
  return null;
}

// ════════════════════════════════════════════════════════════════
// 純計算
// ════════════════════════════════════════════════════════════════
function calcCPM(budget, views) {
  if (!budget || !views) return null;
  return (budget / views) * 1000;
}
function calcEngagement(m) {
  if (!m || !m.views) return null;
  return ((m.likes || 0) + (m.comments || 0) + (m.shares || 0)) / m.views * 100;
}
function fmtNum(n) {
  if (n == null) return '—';
  if (n >= 10000) return (n / 10000).toFixed(1) + '萬';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}
function fmtMoney(n) {
  if (n == null) return '—';
  return 'NT$ ' + Number(n).toLocaleString();
}
function fmtPct(n) {
  if (n == null) return '—';
  return n.toFixed(2) + '%';
}

// ════════════════════════════════════════════════════════════════
// State + 渲染
// ════════════════════════════════════════════════════════════════
let editingId = null;
let currentRating = 0;

function getFiltered() {
  const platform = document.getElementById('filter-platform').value;
  const sortBy = document.getElementById('sort-by').value;
  const q = document.getElementById('search').value.trim().toLowerCase();

  let list = Storage.load();
  if (platform) list = list.filter(v => v.platform === platform);
  if (q) list = list.filter(v =>
    (v.title || '').toLowerCase().includes(q) ||
    (v.vendor || '').toLowerCase().includes(q) ||
    (v.topic || '').toLowerCase().includes(q)
  );

  list.sort((a, b) => {
    if (sortBy === 'views') return (b.metrics?.views || 0) - (a.metrics?.views || 0);
    if (sortBy === 'date') return (b.publishedAt || '').localeCompare(a.publishedAt || '');
    if (sortBy === 'rating') return (b.review?.rating || 0) - (a.review?.rating || 0);
    return (calcEngagement(b.metrics) || 0) - (calcEngagement(a.metrics) || 0);
  });

  return list;
}

function renderSummary() {
  const all = Storage.load();
  const totalBudget = all.reduce((s, v) => s + (v.budget || 0), 0);
  const totalViews = all.reduce((s, v) => s + (v.metrics?.views || 0), 0);
  const totalEngagements = all.reduce((s, v) => {
    const m = v.metrics || {};
    return s + (m.likes || 0) + (m.comments || 0) + (m.shares || 0);
  }, 0);
  const avgEngagement = totalViews ? (totalEngagements / totalViews * 100) : null;
  const overallCPM = (totalBudget && totalViews) ? (totalBudget / totalViews * 1000) : null;

  const html = [
    `<div class="stat"><div class="stat-label">總影片數</div><div class="stat-value">${all.length}</div></div>`,
    `<div class="stat"><div class="stat-label">總預算</div><div class="stat-value">${fmtMoney(totalBudget)}</div></div>`,
    `<div class="stat"><div class="stat-label">總觀看數</div><div class="stat-value">${fmtNum(totalViews)}</div></div>`,
    `<div class="stat"><div class="stat-label">平均互動率</div><div class="stat-value">${fmtPct(avgEngagement)}</div></div>`,
    `<div class="stat"><div class="stat-label">整體 CPM</div><div class="stat-value">${overallCPM != null ? 'NT$ ' + overallCPM.toFixed(1) : '—'}</div><div class="stat-sub">每千次觀看成本</div></div>`,
  ].join('');
  document.getElementById('summary').innerHTML = html;
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('empty-state');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = list.map(v => {
    const m = v.metrics || {};
    const cpm = calcCPM(v.budget, m.views);
    const eng = calcEngagement(m);
    const engClass = eng == null ? '' : (eng >= 5 ? 'good' : eng < 1 ? 'bad' : '');
    const stars = '★'.repeat(v.review?.rating || 0) + '☆'.repeat(5 - (v.review?.rating || 0));
    const platformName = v.platform === 'facebook' ? 'Facebook' : 'YouTube';

    return `
      <div class="card" data-id="${v.id}">
        <div class="card-head">
          <div class="card-title">${escapeHtml(v.title || '(未命名)')}</div>
          <div class="card-meta">
            <span class="platform-badge ${v.platform}">${platformName}</span>
            <span>${v.publishedAt || '—'}</span>
            <span>·</span>
            <span>${escapeHtml(v.topic || '—')}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="metric-row">
            <div class="metric"><div class="metric-label">觀看</div><div class="metric-value">${fmtNum(m.views)}</div></div>
            <div class="metric"><div class="metric-label">讚</div><div class="metric-value">${fmtNum(m.likes)}</div></div>
            <div class="metric"><div class="metric-label">留言</div><div class="metric-value">${fmtNum(m.comments)}</div></div>
            <div class="metric"><div class="metric-label">分享</div><div class="metric-value">${fmtNum(m.shares)}</div></div>
          </div>
          <div class="card-perf">
            <div class="perf-item">
              <div class="perf-label">互動率</div>
              <div class="perf-value ${engClass}">${fmtPct(eng)}</div>
            </div>
            <div class="perf-item">
              <div class="perf-label">CPM</div>
              <div class="perf-value">${cpm != null ? 'NT$ ' + cpm.toFixed(1) : '—'}</div>
            </div>
            <div class="perf-item">
              <div class="perf-label">預算</div>
              <div class="perf-value">${fmtMoney(v.budget)}</div>
            </div>
          </div>
          <div class="card-rating">${stars}</div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openView(el.dataset.id));
  });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ════════════════════════════════════════════════════════════════
// Modal: 新增 / 編輯
// ════════════════════════════════════════════════════════════════
function openEdit(id) {
  editingId = id;
  const form = document.getElementById('form-video');
  const setVal = (name, val) => { form.elements[name].value = val; };
  form.reset();
  setRating(0);
  document.getElementById('btn-delete').style.display = id ? 'inline-block' : 'none';
  document.getElementById('modal-title').textContent = id ? '編輯影片' : '新增影片';

  if (id) {
    const v = Storage.load().find(x => x.id === id);
    if (v) {
      setVal('title', v.title || '');
      setVal('platform', v.platform || 'youtube');
      setVal('url', v.url || '');
      setVal('publishedAt', v.publishedAt || '');
      setVal('vendor', v.vendor || '');
      setVal('topic', v.topic || '衛教');
      setVal('budget', v.budget ?? '');
      const m = v.metrics || {};
      setVal('views', m.views ?? '');
      setVal('likes', m.likes ?? '');
      setVal('comments', m.comments ?? '');
      setVal('shares', m.shares ?? '');
      const r = v.review || {};
      setVal('strengths', r.strengths || '');
      setVal('improvements', r.improvements || '');
      setVal('recommendations', r.recommendations || '');
      setRating(r.rating || 0);
    }
  } else {
    setVal('publishedAt', new Date().toISOString().slice(0, 10));
  }

  document.getElementById('modal-edit').classList.add('show');
}

function closeModals() {
  document.querySelectorAll('.modal-bg').forEach(el => el.classList.remove('show'));
  editingId = null;
}

function setRating(v) {
  currentRating = v;
  document.querySelector('input[name="rating"]').value = v;
  document.querySelectorAll('#rating-stars .star').forEach(s => {
    s.classList.toggle('active', Number(s.dataset.v) <= v);
  });
}

function saveVideo() {
  const form = document.getElementById('form-video');
  const data = new FormData(form);
  const get = (k) => (data.get(k) ?? '').toString();
  const trim = (k) => get(k).trim();
  const num = (k) => {
    const v = get(k);
    return v === '' ? null : Number(v);
  };

  const title = trim('title');
  if (!title) {
    alert('請填寫影片標題');
    return;
  }

  const video = {
    id: editingId,
    title,
    platform: get('platform'),
    url: trim('url'),
    publishedAt: get('publishedAt'),
    vendor: trim('vendor'),
    topic: get('topic'),
    budget: num('budget'),
    metrics: {
      views: num('views'),
      likes: num('likes'),
      comments: num('comments'),
      shares: num('shares'),
      fetchedAt: null,
    },
    review: {
      strengths: trim('strengths'),
      improvements: trim('improvements'),
      recommendations: trim('recommendations'),
      rating: currentRating,
    },
  };

  Storage.upsert(video);
  closeModals();
  renderAll();
}

function deleteVideo() {
  if (!editingId) return;
  if (!confirm('確定要刪除這支影片紀錄嗎？')) return;
  Storage.remove(editingId);
  closeModals();
  renderAll();
}

// ════════════════════════════════════════════════════════════════
// Modal: 詳細檢視
// ════════════════════════════════════════════════════════════════
function openView(id) {
  const v = Storage.load().find(x => x.id === id);
  if (!v) return;
  const m = v.metrics || {};
  const r = v.review || {};
  const cpm = calcCPM(v.budget, m.views);
  const eng = calcEngagement(m);
  const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));

  document.getElementById('view-title').textContent = v.title || '(未命名)';
  document.getElementById('view-body').innerHTML = `
    <div class="card-meta" style="margin-bottom:14px;">
      <span class="platform-badge ${v.platform}">${v.platform === 'facebook' ? 'Facebook' : 'YouTube'}</span>
      <span>${v.publishedAt || '—'}</span>
      <span>·</span>
      <span>${escapeHtml(v.topic || '—')}</span>
      ${v.url ? `<span>·</span><a href="${escapeHtml(v.url)}" target="_blank" rel="noopener" style="color:var(--primary);">看影片 ↗</a>` : ''}
    </div>

    <div class="detail-grid">
      <div class="detail-block"><div class="detail-label">外包廠商</div><div class="detail-value">${escapeHtml(v.vendor || '—')}</div></div>
      <div class="detail-block"><div class="detail-label">製作預算</div><div class="detail-value">${fmtMoney(v.budget)}</div></div>
      <div class="detail-block"><div class="detail-label">觀看數</div><div class="detail-value">${fmtNum(m.views)}</div></div>
      <div class="detail-block"><div class="detail-label">互動數</div><div class="detail-value">讚 ${fmtNum(m.likes)} ｜ 留言 ${fmtNum(m.comments)} ｜ 分享 ${fmtNum(m.shares)}</div></div>
      <div class="detail-block"><div class="detail-label">互動率</div><div class="detail-value">${fmtPct(eng)}</div></div>
      <div class="detail-block"><div class="detail-label">CPM</div><div class="detail-value">${cpm != null ? 'NT$ ' + cpm.toFixed(1) : '—'}</div></div>
      <div class="detail-block"><div class="detail-label">整體評分</div><div class="detail-value" style="color:var(--accent); font-size:1.05rem;">${stars}</div></div>
    </div>

    <div class="review-block">
      <h4>👍 做得好的地方</h4>
      <p>${escapeHtml(r.strengths) || '<span style="color:var(--text-soft);">未填寫</span>'}</p>
    </div>
    <div class="review-block">
      <h4>🔧 可以改進的地方</h4>
      <p>${escapeHtml(r.improvements) || '<span style="color:var(--text-soft);">未填寫</span>'}</p>
    </div>
    <div class="review-block">
      <h4>📋 給長官的建議</h4>
      <p>${escapeHtml(r.recommendations) || '<span style="color:var(--text-soft);">未填寫</span>'}</p>
    </div>
  `;
  document.getElementById('btn-edit-from-view').dataset.id = id;
  document.getElementById('modal-view').classList.add('show');
}

// ════════════════════════════════════════════════════════════════
// 匯出 CSV / 列印
// ════════════════════════════════════════════════════════════════
function exportCSV() {
  const list = getFiltered();
  if (!list.length) { alert('沒有可匯出的資料'); return; }

  const headers = ['標題','平台','發布日期','廠商','主題','預算','觀看數','讚','留言','分享','互動率(%)','CPM(NT$)','評分','做得好','可改進','給長官建議'];
  const rows = list.map(v => {
    const m = v.metrics || {};
    const r = v.review || {};
    const cpm = calcCPM(v.budget, m.views);
    const eng = calcEngagement(m);
    return [
      v.title || '', v.platform || '', v.publishedAt || '',
      v.vendor || '', v.topic || '', v.budget ?? '',
      m.views ?? '', m.likes ?? '', m.comments ?? '', m.shares ?? '',
      eng != null ? eng.toFixed(2) : '',
      cpm != null ? cpm.toFixed(1) : '',
      r.rating || 0,
      r.strengths || '', r.improvements || '', r.recommendations || '',
    ];
  });

  const csv = [headers, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `短影音分析_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ════════════════════════════════════════════════════════════════
// 事件綁定
// ════════════════════════════════════════════════════════════════
function renderAll() {
  renderSummary();
  renderGrid();
}

document.addEventListener('DOMContentLoaded', () => {
  showStorageWarning();

  const safeBind = (id, fn) => {
    document.getElementById(id).addEventListener('click', (e) => {
      try { fn(e); } catch (err) {
        console.error(err);
        alert('發生錯誤：' + (err && err.message ? err.message : err));
      }
    });
  };

  safeBind('btn-add', () => openEdit(null));
  safeBind('btn-save', saveVideo);
  safeBind('btn-delete', deleteVideo);
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-print').addEventListener('click', () => window.print());

  document.getElementById('btn-edit-from-view').addEventListener('click', (e) => {
    const id = e.currentTarget.dataset.id;
    closeModals();
    openEdit(id);
  });

  document.querySelectorAll('[data-close]').forEach(el =>
    el.addEventListener('click', closeModals)
  );
  document.querySelectorAll('.modal-bg').forEach(el =>
    el.addEventListener('click', (e) => { if (e.target === el) closeModals(); })
  );

  document.querySelectorAll('#rating-stars .star').forEach(s =>
    s.addEventListener('click', () => setRating(Number(s.dataset.v)))
  );

  ['filter-platform','sort-by','search'].forEach(id =>
    document.getElementById(id).addEventListener('input', renderGrid)
  );

  renderAll();
});
</script>
